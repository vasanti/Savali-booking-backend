<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking - Saavali</title>

<link rel="stylesheet" href="style.css">

<!-- 📅 Flatpickr -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

</head>

<body>

<header class="header">
  <div class="nav-container">

    <div class="logo">
      <img src="images/logo.png">
      <div class="logo-text">
        <span class="brand">Savali</span>
        <small>The shades of shadow</small>
      </div>
    </div>

    <nav class="nav-links">
      <a href="index.html">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="stay.html">Stay</a>
      <a href="booking.html">Booking</a>
    </nav>

  </div>
</header>

<div class="container">

<h1>🌿 Book Your Stay at Saavali</h1>
<p class="subtitle">Your peaceful holiday retreat in nature</p>

<div class="form-box">

<form id="bookingForm">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Phone</label>
<input type="tel" name="phone" required pattern="[0-9]{10}">

<label>Email</label>
<input type="email" name="email" required>

<label>Check-in</label>
<input type="text" id="checkin" name="checkin" required>

<label>Check-out</label>
<input type="text" id="checkout" name="checkout" required>

<p id="availability-msg"></p>

<label>Guests (Max 6)</label>
<input type="number" name="guests" min="1" max="6" required>

<button type="submit" id="submitBtn">🌿 Submit Booking</button>

</form>

</div>

</div>

<!-- WhatsApp Floating -->
<a href="https://wa.me/919890021266" class="whatsapp">💬</a>

<footer class="footer">
  <div class="footer-container">

    <div class="footer-col">
      <h3>Savali</h3>
      <p>Nature. Culture. Adventure.</p>
    </div>

    <div class="footer-col">
      <h4>Links</h4>
      <a href="index.html">About</a>
      <a href="booking.html">Booking</a>
      <a href="gallery.html">Gallery</a>
    </div>

    <div class="footer-col">
      <h4>Contact</h4>
      <p>📍 Bhor</p>
      <p>📞 +91 XXXXXXXX</p>
    </div>

  </div>

  <p class="copyright">© SanVsan Solutions Pvt.Ltd.</p>
</footer>

<script>

// ==============================
// 🔗 SCRIPT URL
// ==============================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCDfJ9rxnCWKOfvSRjXh-kdsuevP5b4AD51C23ROgI5wqxV1d9ojGhNcrJqUEY_ocKjQ/exec";

// ==============================
// 📅 GLOBAL
// ==============================
let bookedDates = [];

const checkin = document.getElementById("checkin");
const checkout = document.getElementById("checkout");
const msg = document.getElementById("availability-msg");
const guestInput = document.querySelector('[name="guests"]');
const btn = document.getElementById("submitBtn");

// ==============================
// 📅 INIT CALENDAR
// ==============================
const checkinPicker = flatpickr("#checkin", {
  minDate: "today",
  disable: bookedDates,
  dateFormat: "Y-m-d",
  onChange: validateDates
});

const checkoutPicker = flatpickr("#checkout", {
  minDate: "today",
  disable: bookedDates,
  dateFormat: "Y-m-d",
  onChange: validateDates
});

// ==============================
// 📅 FETCH BOOKED DATES
// ==============================
fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {
    bookedDates = data;
    checkinPicker.set("disable", bookedDates);
    checkoutPicker.set("disable", bookedDates);
  })
  .catch(() => {
    console.log("Could not load booked dates");
  });

// ==============================
// 🔓 OPEN CALENDAR
// ==============================
checkin.addEventListener("focus", () => checkinPicker.open());
checkout.addEventListener("focus", () => checkoutPicker.open());

// ==============================
// 🔍 VALIDATION
// ==============================
function validateDates() {

  if (!checkin.value || !checkout.value) return false;

  if (checkout.value < checkin.value) {
    msg.style.color = "red";
    msg.innerText = "⚠ Check-out must be after check-in";
    return false;
  }

  msg.style.color = "green";
  msg.innerText = "✅ Dates available";
  return true;
}

// ==============================
// 👥 GUEST LIMIT
// ==============================
guestInput.addEventListener("input", function() {
  if (this.value > 6) {
    alert("⚠ Maximum 6 guests allowed.\nFor more, contact us on WhatsApp.");
    window.open("https://wa.me/919890021266", "_blank");
    this.value = 6;
  }
});

// ==============================
// 📩 SUBMIT BOOKING (FIXED)
// ==============================
document.getElementById("bookingForm").addEventListener("submit", function(e) {

  e.preventDefault();

  if (!validateDates()) {
    alert("❌ Please select valid available dates.");
    return;
  }

  const formData = new FormData(this);

  btn.innerText = "⏳ Sending...";
  btn.disabled = true;

  fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "success") {

      alert(
        "🌿 Booking Request Sent!\n\n" +
        "📩 You will receive confirmation email.\n\n" +
        "Thank you for choosing Savali 🌿"
      );

      document.getElementById("bookingForm").reset();
      msg.innerText = "";

    } else {
      alert("❌ " + (data.error || "Something failed"));
    }

    btn.innerText = "🌿 Submit Booking";
    btn.disabled = false;

  })
  .catch(() => {

    alert("❌ Network error. Please try again.");

    btn.innerText = "🌿 Submit Booking";
    btn.disabled = false;

  });

});

</script>

</body>
</html>
